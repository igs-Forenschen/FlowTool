<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Flow — 動作流程編輯器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #1a1a22; color: #e2e0d8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

/* Layout */
#app { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
#sidebar { width: 200px; min-width: 200px; background: #12121a; border-right: 1px solid #2a2a38; display: flex; flex-direction: column; }
#sidebar-header { padding: 14px 12px 10px; border-bottom: 1px solid #2a2a38; }
#sidebar-header h2 { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #666; margin-bottom: 10px; }
#dragon-list { flex: 1; overflow-y: auto; padding: 8px; }
.dragon-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; color: #aaa; transition: all 0.15s; }
.dragon-item:hover { background: #1e1e2e; color: #e2e0d8; }
.dragon-item.active { background: #1e3a5f; color: #7eb8f0; }
.dragon-item .di-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dragon-item .di-del { opacity: 0; font-size: 14px; color: #666; cursor: pointer; flex-shrink: 0; }
.dragon-item:hover .di-del { opacity: 1; }
.dragon-item .di-del:hover { color: #e06060; }

/* Toolbar */
#toolbar { background: #12121a; border-bottom: 1px solid #2a2a38; padding: 8px 14px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #333; background: #1e1e2e; color: #ccc; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: #252535; color: #e2e0d8; border-color: #444; }
.btn.active { background: #1e3a5f; color: #7eb8f0; border-color: #2a5080; }
.btn.primary { background: #1e3a5f; color: #7eb8f0; border-color: #2a5080; }
.btn.danger { background: #3a1e1e; color: #f07070; border-color: #5a2a2a; }
.sep { width: 1px; height: 20px; background: #2a2a38; margin: 0 2px; }

/* Canvas */
#canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #14141e; cursor: default; }
#grid-bg { position: absolute; inset: 0; background-image: radial-gradient(circle, #2a2a38 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; z-index: 1; }
#regions-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
#canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }
#svg-conn { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 4; }
#svg-conn * { pointer-events: none; }

/* Nodes */
.node { position: absolute; border-radius: 8px; border: 1.5px solid; cursor: grab; user-select: none; min-width: 150px; max-width: 200px; transition: box-shadow 0.12s; pointer-events: auto; }
.node:active { cursor: grabbing; }
.node.selected { outline: 2px solid #7eb8f0; outline-offset: 2px; }
.node.multi-selected { outline: 2px solid #f0c060; outline-offset: 2px; }
.node.connect-src { outline: 2px solid #5dcaa5; outline-offset: 2px; cursor: crosshair; }
.node-cat { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; padding: 6px 10px 4px; border-radius: 6px 6px 0 0; }
.node-body { padding: 8px 12px 10px; }
.node-name { font-size: 13px; font-family: 'Consolas', 'Courier New', monospace; line-height: 1.4; word-break: break-all; }
.node-notes { font-size: 11px; margin-top: 5px; opacity: 0.7; font-style: italic; }

/* Status bar */
#statusbar { background: #12121a; border-top: 1px solid #2a2a38; padding: 4px 14px; font-size: 11px; color: #555; flex-shrink: 0; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 500; }
.modal-box { background: #1a1a26; border: 1px solid #333; border-radius: 12px; padding: 22px; width: 360px; }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #e2e0d8; }
.modal-label { font-size: 11px; color: #888; margin-bottom: 5px; display: block; }
.modal-input { width: 100%; background: #12121a; border: 1px solid #333; border-radius: 6px; padding: 8px 10px; color: #e2e0d8; font-size: 13px; font-family: inherit; outline: none; }
.modal-input:focus { border-color: #2a5080; }
textarea.modal-input { resize: none; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; }
select.modal-input { cursor: pointer; }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.radio-group { display: flex; gap: 14px; margin-top: 6px; }
.radio-group label { font-size: 13px; color: #ccc; display: flex; align-items: center; gap: 5px; cursor: pointer; }

/* Main area */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Preview mode */
body.preview-mode #canvas-wrap { cursor: default !important; }
body.preview-mode .node { cursor: default !important; }
#btn-preview.active { background: #2a4020; color: #7dc88a; border-color: #3a6030; }

/* Add dragon input inline */
#add-dragon-wrap { display: flex; gap: 6px; margin-top: 8px; }
#add-dragon-wrap input { flex: 1; background: #1e1e2e; border: 1px solid #333; border-radius: 5px; padding: 5px 8px; color: #e2e0d8; font-size: 12px; outline: none; }
#add-dragon-wrap input:focus { border-color: #2a5080; }
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>龍角色</h2>
      <div id="add-dragon-wrap">
        <input type="text" id="new-dragon-name" placeholder="龍的名稱" onkeydown="if(event.key==='Enter')addDragon()"/>
        <button class="btn primary" onclick="addDragon()">+</button>
      </div>
    </div>
    <div id="dragon-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="toolbar">
      <button id="btn-select" class="btn active" onclick="setMode('select')" title="選取 / 移動節點">▣ 選取</button>
      <button id="btn-connect" class="btn" onclick="setMode('connect')" title="點兩個節點建立連線">⇢ 連線</button>
      <button id="btn-region" class="btn" onclick="setMode('region')" title="拖拉框選範圍，建立情境標籤">⬚ 框選情境</button>
      <button id="btn-text" class="btn" onclick="setMode('text')" title="點畫布建立文字 (T)">T 文字</button>
      <div class="sep"></div>
      <button class="btn" onclick="showImport()">貼上動作</button>
      <button class="btn" onclick="copyNode()" title="複製選取的節點 (Ctrl+D)">複製節點</button>
      <button class="btn" onclick="clearCanvas()">清除畫布</button>
      <div class="sep"></div>
      <button class="btn" onclick="autoLayout()">自動排列</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="exportJSON()" title="匯出 JSON 後上傳到 GitHub，其他人開網頁就能看到">↓ 匯出 JSON</button>
      <button class="btn" onclick="shareLink()" title="產生分享連結並複製到剪貼簿">🔗 產生分享連結</button>
      <button class="btn primary" onclick="exportPNG()">↓ 匯出 PNG</button>
      <div class="sep"></div>
      <button id="btn-preview" class="btn" onclick="togglePreview()" title="預覽模式 — 鎖定編輯，適合給美術程式預覽">👁 預覽</button>
    </div>

    <div id="canvas-wrap">
      <div id="grid-bg"></div>
      <div id="regions-layer"></div>
      <div id="text-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;"></div>
      <div id="canvas"></div>
      <svg id="svg-conn"><defs id="svg-defs"></defs></svg>
      <svg id="svg-top" style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:5;"></svg>
      <div id="region-draft" style="display:none;position:absolute;border:2px dashed #7eb8f0;border-radius:6px;background:rgba(126,184,240,0.08);pointer-events:none;z-index:6;"></div>
      <div id="select-rect" style="display:none;position:absolute;border:1.5px dashed #e0e0e0;border-radius:3px;background:rgba(255,255,255,0.05);pointer-events:none;z-index:7;"></div>
    </div>

    <div id="statusbar">選取模式 — 拖曳節點移動，雙擊節點編輯，在連線上點擊可以編輯</div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="modal-confirm" class="modal-overlay" style="display:none">
  <div class="modal-box" style="width:300px">
    <div class="modal-title" id="confirm-msg">確定嗎？</div>
    <div class="modal-actions">
      <button class="btn" onclick="hideModal('modal-confirm')">取消</button>
      <button class="btn danger" id="confirm-ok-btn" onclick="confirmResolve(true)">確定</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div id="modal-import" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">貼上動作名稱</div>
    <label class="modal-label">每行一個動作名稱（系統會自動偵測類型）</label>
    <textarea class="modal-input" id="import-text" rows="10" placeholder="Small_Dragon_Idle_01.Animation&#10;Small_Dragon_Fly_02.Animation&#10;Small_Dragon_Attack_01.Animation&#10;Small_Dragon_Die_01.Animation"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="hideModal('modal-import')">取消</button>
      <button class="btn primary" onclick="importActions()">生成節點</button>
    </div>
  </div>
</div>

<!-- New Connection Modal -->
<div id="modal-conn" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">建立連線</div>
    <div style="margin-bottom:14px">
      <label class="modal-label">連線顏色</label>
      <div id="conn-color-picker" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    </div>
    <div style="margin-bottom:14px">
      <label class="modal-label">箭頭方向</label>
      <div class="radio-group">
        <label><input type="radio" name="conn-dir" value="forward" checked> A → B</label>
        <label><input type="radio" name="conn-dir" value="backward"> A ← B</label>
        <label><input type="radio" name="conn-dir" value="both"> A ⇄ B</label>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <label class="modal-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="conn-same-pose" style="width:14px;height:14px;cursor:pointer;" checked>
        頭尾幀同動作（兩端都套用圖案）
      </label>
    </div>
    <div style="margin-bottom:4px">
      <label class="modal-label">端點圖案</label>
      <div id="conn-shape-picker" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="cancelConnect()">取消</button>
      <button class="btn primary" onclick="confirmConnect()">建立連線</button>
    </div>
  </div>
</div>

<!-- Edit Node Modal -->
<div id="modal-node" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">編輯節點</div>
    <div style="margin-bottom:12px">
      <label class="modal-label">動作名稱</label>
      <input type="text" class="modal-input" id="node-edit-name"/>
    </div>
    <div style="margin-bottom:12px">
      <label class="modal-label">類別</label>
      <select class="modal-input" id="node-edit-cat"></select>
    </div>
    <div style="margin-bottom:4px">
      <label class="modal-label">備註（動畫時長、是否可中斷、優先權等）</label>
      <textarea class="modal-input" id="node-edit-notes" rows="3" placeholder="例：2.4s, 不可中斷, 優先權 3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteNode()">刪除節點</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="hideModal('modal-node')">取消</button>
      <button class="btn primary" onclick="saveNode()">儲存</button>
    </div>
  </div>
</div>

<!-- Edit Connection Modal -->
<div id="modal-conn-edit" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">編輯連線</div>
    <div style="margin-bottom:14px">
      <label class="modal-label">連線顏色</label>
      <div id="conn-edit-color-picker" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    </div>
    <div style="margin-bottom:14px">
      <label class="modal-label">箭頭方向</label>
      <div class="radio-group">
        <label><input type="radio" name="conn-edit-dir" value="forward"> A → B</label>
        <label><input type="radio" name="conn-edit-dir" value="backward"> A ← B</label>
        <label><input type="radio" name="conn-edit-dir" value="both"> A ⇄ B</label>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <label class="modal-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="conn-edit-same-pose" style="width:14px;height:14px;cursor:pointer;">
        頭尾幀同動作（兩端都套用圖案）
      </label>
    </div>
    <div style="margin-bottom:4px">
      <label class="modal-label">端點圖案</label>
      <div id="conn-edit-shape-picker" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteConn()">刪除連線</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="hideModal('modal-conn-edit')">取消</button>
      <button class="btn primary" onclick="saveConn()">儲存</button>
    </div>
  </div>
</div>

<!-- Region Name Modal -->
<div id="modal-region" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">建立情境區域</div>
    <div style="margin-bottom:14px">
      <label class="modal-label">情境名稱</label>
      <input type="text" class="modal-input" id="region-label" placeholder="例：空中追擊階段、受傷後反應、待機循環"/>
    </div>
    <div style="margin-bottom:16px">
      <label class="modal-label">顏色</label>
      <div id="region-color-picker" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="hideModal('modal-region')">取消</button>
      <button class="btn primary" onclick="saveRegion()">建立</button>
    </div>
  </div>
</div>

<!-- Region Edit Modal -->
<div id="modal-region-edit" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">編輯情境區域</div>
    <div style="margin-bottom:14px">
      <label class="modal-label">情境名稱</label>
      <input type="text" class="modal-input" id="region-edit-label"/>
    </div>
    <div style="margin-bottom:16px">
      <label class="modal-label">顏色</label>
      <div id="region-edit-color-picker" style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteRegion()">刪除區域</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="hideModal('modal-region-edit')">取消</button>
      <button class="btn primary" onclick="saveRegionEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- Text Edit Modal -->
<div id="modal-text-edit" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">編輯文字</div>
    <div style="margin-bottom:12px">
      <label class="modal-label">內容</label>
      <textarea class="modal-input" id="text-edit-content" rows="4" placeholder="輸入文字內容…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveTextItem();}"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteTextItem()">刪除</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="hideModal('modal-text-edit')">取消</button>
      <button class="btn primary" onclick="saveTextItem()">儲存</button>
    </div>
  </div>
</div>

<script>
// ─── Custom confirm (replaces browser confirm() which is blocked in file://) ──
let _confirmCb = null;
function customConfirm(msg, okLabel, cb) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok-btn').textContent = okLabel || '確定';
  _confirmCb = cb;
  showModal('modal-confirm');
}
function confirmResolve(ok) {
  hideModal('modal-confirm');
  if (ok && _confirmCb) _confirmCb();
  _confirmCb = null;
}

// ─── Pose endpoint shapes ─────────────────────────────────────────────────────
const POSE_SHAPES = [
  { id: 'none',     label: '無',     draw: () => {} },
  { id: 'diamond',  label: '菱形',   draw: (s,x,y,sz,f,st) => { const p=document.createElementNS('http://www.w3.org/2000/svg','polygon'); p.setAttribute('points',`${x},${y-sz} ${x+sz},${y} ${x},${y+sz} ${x-sz},${y}`); p.setAttribute('fill',f); p.setAttribute('stroke',st); p.setAttribute('stroke-width','1.5'); p.style.pointerEvents='none'; s.appendChild(p); } },
  { id: 'circle',   label: '圓形',   draw: (s,x,y,sz,f,st) => { const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',sz*0.85); c.setAttribute('fill',f); c.setAttribute('stroke',st); c.setAttribute('stroke-width','1.5'); c.style.pointerEvents='none'; s.appendChild(c); } },
  { id: 'square',   label: '方形',   draw: (s,x,y,sz,f,st) => { const r=document.createElementNS('http://www.w3.org/2000/svg','rect'); r.setAttribute('x',x-sz*0.8); r.setAttribute('y',y-sz*0.8); r.setAttribute('width',sz*1.6); r.setAttribute('height',sz*1.6); r.setAttribute('fill',f); r.setAttribute('stroke',st); r.setAttribute('stroke-width','1.5'); r.setAttribute('rx','2'); r.style.pointerEvents='none'; s.appendChild(r); } },
  { id: 'star4',    label: '四角星', draw: (s,x,y,sz,f,st) => { const a=sz,b=sz*0.4; const pts=[0,1,2,3].map(i=>{const ang=i*Math.PI/2-Math.PI/4;return `${(x+a*Math.cos(ang)).toFixed(1)},${(y+a*Math.sin(ang)).toFixed(1)} ${(x+b*Math.cos(ang+Math.PI/4)).toFixed(1)},${(y+b*Math.sin(ang+Math.PI/4)).toFixed(1)}`}).join(' '); const p=document.createElementNS('http://www.w3.org/2000/svg','polygon'); p.setAttribute('points',pts); p.setAttribute('fill',st); p.setAttribute('stroke',st); p.setAttribute('stroke-width','0.5'); p.style.pointerEvents='none'; s.appendChild(p); } },
  { id: 'hex',      label: '六角形', draw: (s,x,y,sz,f,st) => { const pts=[0,1,2,3,4,5].map(i=>{const a=i*Math.PI/3-Math.PI/6;return `${(x+sz*Math.cos(a)).toFixed(1)},${(y+sz*Math.sin(a)).toFixed(1)}`}).join(' '); const p=document.createElementNS('http://www.w3.org/2000/svg','polygon'); p.setAttribute('points',pts); p.setAttribute('fill',f); p.setAttribute('stroke',st); p.setAttribute('stroke-width','1.5'); p.style.pointerEvents='none'; s.appendChild(p); } },
  { id: 'cross',    label: '十字',   draw: (s,x,y,sz,f,st) => { const t=sz*0.35; [[x-sz,y-t,sz*2,t*2],[x-t,y-sz,t*2,sz*2]].forEach(([rx,ry,rw,rh])=>{const r=document.createElementNS('http://www.w3.org/2000/svg','rect'); r.setAttribute('x',rx); r.setAttribute('y',ry); r.setAttribute('width',rw); r.setAttribute('height',rh); r.setAttribute('fill',st); r.style.pointerEvents='none'; s.appendChild(r);}); } },
  { id: 'triangle', label: '三角形', draw: (s,x,y,sz,f,st) => { const p=document.createElementNS('http://www.w3.org/2000/svg','polygon'); p.setAttribute('points',`${x},${y-sz} ${x+sz*0.9},${y+sz*0.55} ${x-sz*0.9},${y+sz*0.55}`); p.setAttribute('fill',f); p.setAttribute('stroke',st); p.setAttribute('stroke-width','1.5'); p.style.pointerEvents='none'; s.appendChild(p); } },
  { id: 'rotsquare',label: '旋轉方形',draw: (s,x,y,sz,f,st)=>{ const p=document.createElementNS('http://www.w3.org/2000/svg','polygon'); const q=sz*0.82; p.setAttribute('points',`${x},${y-q} ${x+q},${y} ${x},${y+q} ${x-q},${y}`); p.setAttribute('fill',f); p.setAttribute('stroke',st); p.setAttribute('stroke-width','1.5'); p.setAttribute('transform',`rotate(45,${x},${y})`); p.style.pointerEvents='none'; s.appendChild(p); } },
];

function drawPoseShape(svg, shapeId, x, y, sz, fill, stroke) {
  const shape = POSE_SHAPES.find(s => s.id === shapeId) || POSE_SHAPES[0];
  shape.draw(svg, x, y, sz, fill, stroke);
}

// ─── 新增：畫在正尾端的箭頭 ───
function drawEndpointArrow(svg, x, y, angle, color, isSelected) {
  const S = 12; // 箭頭長度
  const W = 0.45; // 箭頭張開角度
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  const tip  = `${x.toFixed(1)},${y.toFixed(1)}`;
  const l1   = `${(x - S*Math.cos(angle-W)).toFixed(1)},${(y - S*Math.sin(angle-W)).toFixed(1)}`;
  const l2   = `${(x - S*Math.cos(angle+W)).toFixed(1)},${(y - S*Math.sin(angle+W)).toFixed(1)}`;
  poly.setAttribute('points', `${tip} ${l1} ${l2}`);
  poly.setAttribute('fill', color);
  poly.setAttribute('stroke', color);
  poly.setAttribute('stroke-width', '1.5');
  poly.setAttribute('stroke-linejoin', 'round');
  if (isSelected) {
    poly.setAttribute('filter', 'drop-shadow(0px 0px 4px rgba(255,255,255,0.8))');
  }
  poly.style.pointerEvents = 'none';
  svg.appendChild(poly);
}

function detectCat(name) {
  const n = name.toLowerCase();
  if (/\b(idle|stand|rest|wait|loop)\b/.test(n)) return '待機';
  if (/\b(walk|run|move|dash|sprint|trot)\b/.test(n)) return '移動';
  if (/\b(fly|glide|soar|hover|flight|flap)\b/.test(n)) return '飛行';
  if (/\b(attack|atk|bite|claw|slash|breath|spit|charge|strike|swipe)\b/.test(n)) return '攻擊';
  if (/\b(hurt|hit|damage|stagger|flinch|knockback)\b/.test(n)) return '受傷';
  if (/\b(die|death|dead|kill|defeat)\b/.test(n)) return '死亡';

function connSides(fn, tn, fromSideOverride = null, toSideOverride = null) {
  const fcx = fn.x+(fn.w||160)/2, fcy = fn.y+(fn.h||70)/2;
  const tcx = tn.x+(tn.w||160)/2, tcy = tn.y+(tn.h||70)/2;
  const dx = tcx-fcx, dy = tcy-fcy;
  let exitSide, entrySide;
  if (Math.abs(dx) >= Math.abs(dy)) {
    exitSide  = dx > 0 ? 'right' : 'left';
    entrySide = dx > 0 ? 'left'  : 'right';
  } else {
    exitSide  = dy > 0 ? 'bottom' : 'top';
    entrySide = dy > 0 ? 'top'    : 'bottom';
  }
  if (fromSideOverride) exitSide  = fromSideOverride;
  if (toSideOverride)   entrySide = toSideOverride;
  return { exitSide, entrySide };
}

// ─── 智慧避障路由 (Candidate Path Scoring) ───────────────────────────────────
function segmentIntersectsBoxes(p1, p2, boxes) {
  const x1 = Math.min(p1.x, p2.x), x2 = Math.max(p1.x, p2.x);
  const y1 = Math.min(p1.y, p2.y), y2 = Math.max(p1.y, p2.y);
  for (const box of boxes) {
    const eps = 0.5;
    if (Math.abs(p1.y - p2.y) < 0.1) { // 水平線
      if (p1.y > box.top + eps && p1.y < box.bottom - eps && x2 > box.left + eps && x1 < box.right - eps) return true;
    } else if (Math.abs(p1.x - p2.x) < 0.1) { // 垂直線
      if (p1.x > box.left + eps && p1.x < box.right - eps && y2 > box.top + eps && y1 < box.bottom - eps) return true;
    }
  }
  return false;
}

function pathScore(pts, boxes) {
  let intersects = 0, length = 0, bends = pts.length - 2;
  for (let i = 0; i < pts.length - 1; i++) {
    if (segmentIntersectsBoxes(pts[i], pts[i+1], boxes)) intersects++;
    length += Math.abs(pts[i+1].x - pts[i].x) + Math.abs(pts[i+1].y - pts[i].y);
  }
  return intersects * 500000 + bends * 2000 + length;
}

function cleanOrthogonalPath(pts) {
  if (!pts || pts.length <= 1) return pts;
  let res = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    const A = res[res.length - 1], B = pts[i], C = pts[i + 1];
    if (Math.hypot(A.x - B.x, A.y - B.y) < 0.5) continue;
    const isSameLine = (Math.abs(A.x - B.x) < 0.1 && Math.abs(B.x - C.x) < 0.1) ||
                       (Math.abs(A.y - B.y) < 0.1 && Math.abs(B.y - C.y) < 0.1);
    if (!isSameLine) res.push(B);
  }
  const last = pts[pts.length - 1];
  if (Math.hypot(res[res.length-1].x - last.x, res[res.length-1].y - last.y) > 0.5) res.push(last);
  return res;
}

function orthoRoute(fn, tn, fromFrac = 0.5, toFrac = 0.5, fromSideOverride = null, toSideOverride = null, midOffset = null) {
  const { exitSide, entrySide } = connSides(fn, tn, fromSideOverride, toSideOverride);
  const edgePt = (node, side, frac) => {
    const nw = node.w||160, nh = node.h||70;
    if (side==='right')  return { x: node.x+nw, y: node.y + nh * frac };
    if (side==='left')   return { x: node.x,    y: node.y + nh * frac };
    if (side==='bottom') return { x: node.x + nw * frac, y: node.y+nh };
    return                       { x: node.x + nw * frac, y: node.y };
  };
  const fp = edgePt(fn, exitSide, fromFrac), tp = edgePt(tn, entrySide, toFrac);

  const GAP = 24;
  const getDir = side => ({ right:{x:1,y:0}, left:{x:-1,y:0}, bottom:{x:0,y:1}, top:{x:0,y:-1} }[side]);
  const dF = getDir(exitSide), dT = getDir(entrySide);
  const p1 = { x: fp.x + dF.x * GAP, y: fp.y + dF.y * GAP };
  const p2 = { x: tp.x + dT.x * GAP, y: tp.y + dT.y * GAP };

  // 障礙物（所有節點都列入，路徑從節點外 GAP px 開始，不會與自身衝突）
  const PAD = 20;
  const dragon = getDragon();
  const boxes = dragon ? dragon.nodes.map(n => ({
    left: n.x - PAD, right: n.x + (n.w||160) + PAD,
    top: n.y - PAD, bottom: n.y + (n.h||70) + PAD
  })) : [];

  // 候選折點軸
  const ULeft  = Math.min(fn.x, tn.x) - PAD - 24;
  const URight  = Math.max(fn.x+(fn.w||160), tn.x+(tn.w||160)) + PAD + 24;
  const UTop    = Math.min(fn.y, tn.y) - PAD - 24;
  const UBottom = Math.max(fn.y+(fn.h||70), tn.y+(tn.h||70)) + PAD + 24;
  const Xs = [...new Set([p1.x, p2.x, (p1.x+p2.x)/2, ULeft, URight])];
  const Ys = [...new Set([p1.y, p2.y, (p1.y+p2.y)/2, UTop, UBottom])];
  if (midOffset !== null) { if (dF.x !== 0) Xs.push(midOffset); else Ys.push(midOffset); }

  const candidates = [];
  if (p1.x === p2.x || p1.y === p2.y) candidates.push([p1, p2]); // 直連
  candidates.push([p1, {x:p2.x, y:p1.y}, p2]);  // L型
  candidates.push([p1, {x:p1.x, y:p2.y}, p2]);
  for (const mx of Xs) candidates.push([p1, {x:mx, y:p1.y}, {x:mx, y:p2.y}, p2]); // Z型
  for (const my of Ys) candidates.push([p1, {x:p1.x, y:my}, {x:p2.x, y:my}, p2]);
  for (const mx of Xs) for (const my of Ys) { // U型
    candidates.push([p1, {x:mx, y:p1.y}, {x:mx, y:my}, {x:p2.x, y:my}, p2]);
    candidates.push([p1, {x:p1.x, y:my}, {x:mx, y:my}, {x:mx, y:p2.y}, p2]);
  }

  let bestPath = null, bestScore = Infinity;
  for (const rawPath of candidates) {
    const A = rawPath[0], B = rawPath[1], Z = rawPath[rawPath.length-1], Y = rawPath[rawPath.length-2];
    if (Math.sign(B.x - A.x) === -dF.x && dF.x !== 0) continue;
    if (Math.sign(B.y - A.y) === -dF.y && dF.y !== 0) continue;
    if (Math.sign(Z.x - Y.x) === dT.x && dT.x !== 0) continue;
    if (Math.sign(Z.y - Y.y) === dT.y && dT.y !== 0) continue;
    const score = pathScore(rawPath, boxes);
    if (score < bestScore) { bestScore = score; bestPath = rawPath; }
  }

  if (!bestPath) bestPath = [p1, {x:p2.x, y:p1.y}, p2];
  return { pts: cleanOrthogonalPath([fp, ...bestPath, tp]), exitSide, entrySide, fp, tp };
}

function ptsToRoundedDPath(pts, radius = 12) {
  if (pts.length < 2) return '';
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = pts[i - 1], curr = pts[i], next = pts[i + 1];
    const d1 = Math.hypot(curr.x - prev.x, curr.y - prev.y);
    const d2 = Math.hypot(next.x - curr.x, next.y - curr.y);
    // Skip rounding if either segment is too short — avoids NaN from division by ~0
    if (d1 < 1 || d2 < 1) {
      d += ` L ${curr.x} ${curr.y}`;
      continue;
    }
    const r = Math.min(radius, d1 / 2.1, d2 / 2.1);
    const v1 = { x: (curr.x - prev.x) / d1, y: (curr.y - prev.y) / d1 };
    const v2 = { x: (next.x - curr.x) / d2, y: (next.y - curr.y) / d2 };
    const p1 = { x: curr.x - v1.x * r, y: curr.y - v1.y * r };
    const p2 = { x: curr.x + v2.x * r, y: curr.y + v2.y * r };
    d += ` L ${p1.x} ${p1.y} Q ${curr.x} ${curr.y} ${p2.x} ${p2.y}`;
  }
  d += ` L ${pts[pts.length - 1].x} ${pts[pts.length - 1].y}`;
  return d;
}

function drawConnection(svg, conn, fromNode, toNode, fromFrac = 0.5, toFrac = 0.5) {
  const isSelected = state.selectedConn === conn.id;
  const baseColor  = connStroke(conn.color || 'blue', false);
  const lineColor  = isSelected ? '#ffffff' : baseColor;
  const arrowColor = lineColor;

  const autoResult = orthoRoute(fromNode, toNode, fromFrac, toFrac, conn.fromSide || null, conn.toSide || null, conn.midOffset ?? null);
  const { exitSide, entrySide } = autoResult;
  const pts = conn.userPts ? [autoResult.fp, ...conn.userPts, autoResult.tp] : autoResult.pts;
  const d = ptsToRoundedDPath(pts, 14);

  const handleConnInteraction = (e, isSeg, isHoriz, segIdx, simplePts) => {
    e.stopPropagation();
    const now = Date.now();
    const isDblClick = (now - (state.lastClickTime || 0) < 300) && (state.lastClickTarget === conn.id);
    state.lastClickTime = now;
    state.lastClickTarget = conn.id;

    if (isDblClick) { openConnEdit(conn.id); return; }

    if (state.selectedConn !== conn.id) {
      state.selectedConn = conn.id;
      state.selectedNode = null;
      state.selectedRegion = null;
      renderConnections();
      setStatus('已選取連線 — 按 Del 刪除，拖曳線段可調整，拖曳端點圓圈重新連接');
    }

    if (isSeg) startSegmentDrag(e, conn, isHoriz, segIdx, simplePts);
  };

  const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  hit.setAttribute('d', d);
  hit.setAttribute('stroke', 'transparent');
  hit.setAttribute('stroke-width', '18');
  hit.setAttribute('fill', 'none');
  hit.style.pointerEvents = 'stroke';
  hit.style.cursor = 'pointer';
  hit.style.display = 'block';
  hit.addEventListener('mousedown', (e) => handleConnInteraction(e, false));
  svg.appendChild(hit);

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d);
  path.setAttribute('stroke', lineColor);
  path.setAttribute('stroke-width', isSelected ? '4' : '2.5');
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('stroke-linecap', 'round');
  if (isSelected) path.setAttribute('filter', 'drop-shadow(0px 0px 6px rgba(255,255,255,0.6))');
  path.style.pointerEvents = 'none';
  svg.appendChild(path);

  const svgTop = document.getElementById('svg-top');
  const fp = autoResult.fp, tp = autoResult.tp;
  if (svgTop) {
    const shapeId = conn.shape || 'diamond';
    if (shapeId !== 'none') {
      const dFill = '#14141e';
      const inset = (pt, side) => {
        const OFF = 5;
        if (side==='right') return { x: pt.x - OFF, y: pt.y };
        if (side==='left')  return { x: pt.x + OFF, y: pt.y };
        if (side==='bottom')return { x: pt.x, y: pt.y - OFF };
        return              { x: pt.x, y: pt.y + OFF };
      };
      const fpIn = inset(fp, exitSide), tpIn = inset(tp, entrySide);
      drawPoseShape(svgTop, shapeId, fpIn.x, fpIn.y, 7, dFill, lineColor);
      if (conn.samePose !== false) drawPoseShape(svgTop, shapeId, tpIn.x, tpIn.y, 7, dFill, lineColor);
    }
  }

  // ─── 繪製置底箭頭 ───
  const ptsLen = pts.length;
  if (ptsLen > 1) {
    if (conn.dir === 'forward' || conn.dir === 'both') {
      const prev = pts[ptsLen - 2], curr = pts[ptsLen - 1];
      const angle = Math.atan2(curr.y - prev.y, curr.x - prev.x);
      drawEndpointArrow(svg, curr.x, curr.y, angle, arrowColor, isSelected);
    }
    if (conn.dir === 'backward' || conn.dir === 'both') {
      const curr = pts[0], next = pts[1];
      const angle = Math.atan2(curr.y - next.y, curr.x - next.x);
      drawEndpointArrow(svg, curr.x, curr.y, angle, arrowColor, isSelected);
    }
  }

  // Label
  let longestSeg = null, longestLen = 0;
  for (let i = 1; i < pts.length; i++) {
    const len = Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
    if (len > longestLen) { longestLen = len; longestSeg = { a: pts[i-1], b: pts[i] }; }
  }
  if (conn.label && longestSeg) {
    const lx = (longestSeg.a.x + longestSeg.b.x) / 2;
    const ly = (longestSeg.a.y + longestSeg.b.y) / 2 - 14; 
    const bgW = conn.label.length * 6.5 + 14;
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', lx - bgW/2); bg.setAttribute('y', ly - 13);
    bg.setAttribute('width', bgW);    bg.setAttribute('height', 18);
    bg.setAttribute('fill', '#1a1a26'); bg.setAttribute('rx', 6);
    bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '1');
    bg.style.pointerEvents = 'auto'; bg.style.cursor = 'pointer';
    bg.addEventListener('mousedown', (e) => handleConnInteraction(e, false));
    svg.appendChild(bg);
    const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    textEl.setAttribute('x', lx); textEl.setAttribute('y', ly + 1);
    textEl.setAttribute('text-anchor', 'middle'); textEl.setAttribute('font-size', '11');
    textEl.setAttribute('fill', '#e2e0d8');
    textEl.setAttribute('font-family', 'Segoe UI, sans-serif');
    textEl.style.pointerEvents = 'auto'; textEl.style.cursor = 'pointer';
    textEl.addEventListener('mousedown', (e) => handleConnInteraction(e, false));
    textEl.textContent = conn.label;
    svg.appendChild(textEl);
  }

  if (!state.preview) {
    const simplePts = cleanOrthogonalPath(pts);

    for (let i = 1; i < simplePts.length; i++) {
      const a = simplePts[i-1], b = simplePts[i];
      const isHoriz = Math.abs(b.y - a.y) < 2;
      const isVert  = Math.abs(b.x - a.x) < 2;
      const segLen  = Math.hypot(b.x-a.x, b.y-a.y);
      if (segLen < 16) continue;
      if (!isHoriz && !isVert) continue;
      const cursor = isHoriz ? 'ns-resize' : 'ew-resize';
      const segHit = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      segHit.setAttribute('x1', a.x); segHit.setAttribute('y1', a.y);
      segHit.setAttribute('x2', b.x); segHit.setAttribute('y2', b.y);
      segHit.setAttribute('stroke', 'transparent');
      segHit.setAttribute('stroke-width', '16');
      segHit.style.pointerEvents = 'stroke';
      segHit.style.cursor = cursor;
      const capturedI = i, capturedIsHoriz = isHoriz;
      segHit.addEventListener('mousedown', e => { handleConnInteraction(e, true, capturedIsHoriz, capturedI, simplePts); });
      svg.appendChild(segHit);
    }
  }

  // ─── 選取時顯示端點拖拉圓圈 (FigJam 風格) ───
  if (isSelected && svgTop) {
    const addHandle = (hx, hy, which) => {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', hx);
      c.setAttribute('cy', hy);
      c.setAttribute('r', '5.5');
      c.setAttribute('fill', '#ffffff');
      c.setAttribute('stroke', lineColor);
      c.setAttribute('stroke-width', '2.5');
      c.style.pointerEvents = 'auto';
      c.style.cursor = 'crosshair';
      c.addEventListener('mousedown', e => {
        e.stopPropagation();
        startEndpointDrag(e, conn, which);
      });
      svgTop.appendChild(c);
    };
    addHandle(fp.x, fp.y, 'from');
    addHandle(tp.x, tp.y, 'to');
  }
}

  state.dragons.forEach(d => {
    const div = document.createElement('div');
    div.className = 'dragon-item' + (d.id === state.activeDragon ? ' active' : '');
    div.innerHTML = `<span class="di-name" title="${d.name}">${d.name}</span><span class="di-del" onclick="deleteDragon('${d.id}',event)" title="刪除">✕</span>`;

    list.appendChild(div);
  });
}

function nearestSide(node, mx, my) {
  const nw = node.w||160, nh = node.h||70;
  const dRight  = Math.abs(mx - (node.x + nw));
  const dLeft   = Math.abs(mx - node.x);
  const dBottom = Math.abs(my - (node.y + nh));
  const dTop    = Math.abs(my - node.y);
  const min = Math.min(dRight, dLeft, dBottom, dTop);
  if (min === dRight)  return 'right';
  if (min === dLeft)   return 'left';
  if (min === dBottom) return 'bottom';
  return 'top';
}

function drawPortIndicators(node, activeSide) {
  const svgTop = document.getElementById('svg-top');
  if (!svgTop) return;
  const nw = node.w||160, nh = node.h||70;
  const sides = {
    right:  { x: node.x+nw,    y: node.y+nh/2 },
    left:   { x: node.x,       y: node.y+nh/2 },
    bottom: { x: node.x+nw/2,  y: node.y+nh   },
    top:    { x: node.x+nw/2,  y: node.y       },
  };
  Object.entries(sides).forEach(([side, pt]) => {
    const isActive = side === activeSide;
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y);
    c.setAttribute('r', isActive ? 8 : 5);
    c.setAttribute('fill', isActive ? '#7eb8f0' : '#2a2a3a');
    c.setAttribute('stroke', isActive ? '#ffffff' : '#555');
    c.setAttribute('stroke-width', '1.5');
    c.style.pointerEvents = 'none';
    svgTop.appendChild(c);
  });
}

function startSegmentDrag(e, conn, isHoriz, segIdx, simplePts) {
  e.stopPropagation();
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const fp = { x: simplePts[0].x, y: simplePts[0].y };
  const tp = { x: simplePts[simplePts.length-1].x, y: simplePts[simplePts.length-1].y };
  const initUserPts = simplePts.slice(1, -1).map(p => ({ x: p.x, y: p.y }));
  const idxA = segIdx - 2;
  const idxB = segIdx - 1;

  const onMove = ev => {
    const cx = ev.clientX - rect.left;
    const cy = ev.clientY - rect.top;
    let newPts = initUserPts.map(p => ({ ...p }));
    if (isHoriz) {
      if (idxA >= 0 && idxA < newPts.length) newPts[idxA].y = cy;
      if (idxB >= 0 && idxB < newPts.length) newPts[idxB].y = cy;
      if (idxA < 0) newPts.unshift({ x: fp.x, y: cy });
      if (idxB >= initUserPts.length) newPts.push({ x: tp.x, y: cy });
    } else {
      if (idxA >= 0 && idxA < newPts.length) newPts[idxA].x = cx;
      if (idxB >= 0 && idxB < newPts.length) newPts[idxB].x = cx;
      if (idxA < 0) newPts.unshift({ x: cx, y: fp.y });
      if (idxB >= initUserPts.length) newPts.push({ x: cx, y: tp.y });
    }
    conn.userPts = newPts;
    renderConnections();
  };

  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    // Clean up degenerate/collinear points from userPts
    if (conn.userPts) conn.userPts = cleanUserPts(conn.userPts, fp, tp);
    renderCanvas();
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Remove redundant collinear or near-duplicate points from userPts.
// If nothing meaningful remains, returns null so auto-routing takes over.
function cleanUserPts(userPts, fp, tp) {
  if (!userPts || userPts.length === 0) return null;

  const full = [fp, ...userPts, tp];
  const THRESH = 4; // px tolerance for collinearity / duplicate

  // Remove duplicate consecutive points
  let cleaned = [full[0]];
  for (let i = 1; i < full.length; i++) {
    const prev = cleaned[cleaned.length - 1];
    if (Math.hypot(full[i].x - prev.x, full[i].y - prev.y) > THRESH) {
      cleaned.push(full[i]);
    }
  }

  // Remove collinear middle points
  let simplified = [cleaned[0]];
  for (let i = 1; i < cleaned.length - 1; i++) {
    const a = simplified[simplified.length - 1];
    const b = cleaned[i];
    const c = cleaned[i + 1];
    const isCollinearH = Math.abs(a.y - b.y) < THRESH && Math.abs(b.y - c.y) < THRESH;
    const isCollinearV = Math.abs(a.x - b.x) < THRESH && Math.abs(b.x - c.x) < THRESH;
    if (!isCollinearH && !isCollinearV) simplified.push(b);
  }
  simplified.push(cleaned[cleaned.length - 1]);

  // Strip fp and tp back out
  const inner = simplified.slice(1, -1);
  return inner.length > 0 ? inner : null;
}

// ─── 端點跨節點拖曳判定 ───
function startEndpointDrag(e, conn, which) {
  e.stopPropagation();
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const dragon = getDragon();

  const onMove = ev => {
    const mx = ev.clientX - rect.left;
    const my = ev.clientY - rect.top;

    let targetNode = null;
    let minDist = Infinity;

    // 尋找游標附近的節點 (加長判定範圍)
    dragon.nodes.forEach(n => {
      const nw = n.w || 160, nh = n.h || 70;
      const pad = 40; 
      if (mx >= n.x - pad && mx <= n.x + nw + pad &&
          my >= n.y - pad && my <= n.y + nh + pad) {
         const cx = n.x + nw/2;
         const cy = n.y + nh/2;
         const dist = Math.hypot(mx - cx, my - cy);
         if (dist < minDist) {
           minDist = dist;
           targetNode = n;
         }
      }
    });

    if (targetNode) {
      const side = nearestSide(targetNode, mx, my);
      if (which === 'from') {
        conn.from = targetNode.id;
        conn.fromSide = side;
      } else {
        conn.to = targetNode.id;
        conn.toSide = side;
      }
      conn.userPts = null;
      conn.midOffset = null;
      renderConnections();
      drawPortIndicators(targetNode, side); // renderConnections 後顯示點
    } else {
       // 如果拖到空地，保持在原本的節點上預覽
       const fallbackNodeId = which === 'from' ? conn.from : conn.to;
       const cNode = dragon.nodes.find(n => n.id === fallbackNodeId);
       if (cNode) {
         const side = nearestSide(cNode, mx, my);
         if (which === 'from') conn.fromSide = side;
         else conn.toSide = side;
         conn.userPts = null;
         conn.midOffset = null;
         renderConnections();
         drawPortIndicators(cNode, side);
       }
    }
  };

  const onUp = ev => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    renderCanvas();
    const finalSide = which === 'from' ? conn.fromSide : conn.toSide;
    const sideNames = { right:'右側', left:'左側', top:'上方', bottom:'下方' };
    setStatus(`已重新連接至「${sideNames[finalSide]}」`);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function renderCanvas() {
  const dragon = getDragon();
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('svg-conn');

  canvas.innerHTML = '';
  const defs = svg.querySelector('defs');
  svg.innerHTML = '';
  svg.appendChild(defs);
  const svgTop = document.getElementById('svg-top');
  if (svgTop) svgTop.innerHTML = '';

  if (!dragon) {
    canvas.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#666;font-size:15px;background:#1a1a26;padding:16px 24px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5);border:1px solid #333;">← 請先選擇或新增龍角色<br><span style="font-size:12px;margin-top:8px;color:#888;display:block">接著點「貼上動作」即可快速生成節點</span></div>';
    return;
  }

  if (dragon.nodes.length === 0 && (!dragon.regions || dragon.regions.length === 0)) {
    canvas.innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#666;font-size:15px;background:#1a1a26;padding:16px 24px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5);border:1px solid #333;">點擊上方的「貼上動作」新增節點</div>';
  }

  renderRegions();
  renderTexts();
  dragon.connections.forEach(conn => {
    const fromNode = dragon.nodes.find(n => n.id === conn.from);
    const toNode = dragon.nodes.find(n => n.id === conn.to);
    if (!fromNode || !toNode) return;
    const fromFrac = conn.fromFrac ?? 0.5;
    const toFrac   = conn.toFrac   ?? 0.5;
    drawConnection(svg, conn, fromNode, toNode, fromFrac, toFrac);
  });
  dragon.nodes.forEach(node => {
    const cat = CATS[node.cat] || CATS['其他'];
    const div = document.createElement('div');
    const isMultiSel = state.multiSelect.nodes.includes(node.id);
    div.className = 'node' +
      (state.selectedNode === node.id ? ' selected' : '') +
      (isMultiSel ? ' multi-selected' : '') +
      (state.connectFrom === node.id ? ' connect-src' : '');
    div.id = 'node-' + node.id;
    div.style.left = node.x + 'px';
    div.style.top = node.y + 'px';
    div.style.background = cat.bg;
    div.style.borderColor = cat.border;

    div.innerHTML = `
      <div class="node-body">
        <div class="node-name" style="color:${cat.text}">${node.name}</div>
        ${node.notes ? `<div class="node-notes" style="color:${cat.label}">${node.notes}</div>` : ''}
      </div>`;

    div.addEventListener('mousedown', e => onNodeMousedown(e, node.id));
    div.addEventListener('dblclick', e => { e.stopPropagation(); openNodeEdit(node.id); });
    canvas.appendChild(div);
  });

  // Measure all node sizes, then re-render connections with correct dimensions
  requestAnimationFrame(() => {
    dragon.nodes.forEach(node => {
      const el = document.getElementById('node-' + node.id);
      if (el) {
        node.w = el.offsetWidth;
        node.h = el.offsetHeight;
      }
    });
    renderConnections();
  });
}

function renderRegions() {
  const dragon = getDragon();
  const rLayer = document.getElementById('regions-layer');
  if (!rLayer || !dragon) return;
  rLayer.innerHTML = '';
  (dragon.regions || []).forEach(region => {
    const rc = REGION_COLORS.find(c => c.id === region.color) || REGION_COLORS[0];
    const div = document.createElement('div');
    const isSel = state.selectedRegion === region.id;
    
    div.style.cssText = `position:absolute;left:${region.x}px;top:${region.y}px;width:${region.w}px;height:${region.h}px;
      background:${rc.bg}; border: 1.5px ${isSel ? 'solid' : 'dashed'} ${rc.border}; border-radius:12px;
      box-sizing:border-box; cursor:pointer; pointer-events:auto;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      box-shadow: ${isSel ? `0 0 0 2px ${rc.border}, 0 4px 12px rgba(0,0,0,0.15)` : '0 4px 12px rgba(0,0,0,0.08)'};
      transition: box-shadow 0.2s, border 0.2s;`;
      
    const tag = document.createElement('div');
    tag.style.cssText = `position:absolute;top:-1.5px;left:-1.5px;background:${rc.border};color:${rc.text};
      font-size:12px;font-weight:600;padding:4px 14px;
      border-radius:12px 0 12px 0; letter-spacing:0.04em;white-space:nowrap;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.2);`;
    tag.textContent = region.label;
    
    div.appendChild(tag);
    div.addEventListener('click', e => {
      e.stopPropagation();
      state.selectedRegion = region.id;
      state.selectedNode = null;
      state.selectedConn = null;
      renderRegions();
      setStatus('已選取情境區域 — 雙擊編輯名稱，拖曳移動（含框內節點）');

    div.addEventListener('dblclick', e => { e.stopPropagation(); openRegionEdit(region.id); });
    div.addEventListener('mousedown', e => { if (state.mode === 'select') onRegionDrag(e, region.id); });
    rLayer.appendChild(div);
  });
}

function importActions() {
  const dragon = getDragon();
  if (!dragon) return;
  const text = document.getElementById('import-text').value;
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  const cols = 4;
  const startX = 40;
  const startY = 40;
  const padX = 180;
  const padY = 110;

  lines.forEach((line, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    dragon.nodes.push({
      id: uid(),
      name: line,
      cat: detectCat(line),
      x: startX + col * padX,
      y: startY + row * padY,
      notes: '',
      w: 160, h: 70,
    });
  });

  hideModal('modal-import');
  renderCanvas();
  setStatus(`已生成 ${lines.length} 個節點`);
}

function setMode(mode) {
  state.mode = mode;
  state.connectFrom = null;
  document.getElementById('btn-select').classList.toggle('active', mode === 'select');
  document.getElementById('btn-connect').classList.toggle('active', mode === 'connect');
  document.getElementById('btn-region').classList.toggle('active', mode === 'region');
  document.getElementById('btn-text').classList.toggle('active', mode === 'text');
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.cursor = mode === 'connect' ? 'crosshair' : mode === 'region' ? 'crosshair' : mode === 'text' ? 'text' : 'default';
  const msgs = {
    select: '選取模式 — 拖曳節點移動，雙擊節點編輯',
    connect: '連線模式 — 點第一個節點，再點第二個節點建立連線',
    region: '框選情境模式 — 在畫布空白處拖拉框選範圍，然後輸入情境名稱',
    text: '文字模式 — 點畫布任意位置放置文字 (T)',
  };
  setStatus(msgs[mode] || '');
  renderCanvas();
}

function onNodeMousedown(e, nodeId) {
  e.stopPropagation();
  if (e.button !== 0) return;
  if (state.preview) return;

  if (state.mode === 'connect') {
    handleConnectClick(nodeId);
    return;
  }

  const dragon = getDragon();
  const isInMultiSelect = state.multiSelect.nodes.includes(nodeId);

  if (isInMultiSelect && state.multiSelect.nodes.length > 1) {
    const nodeIds = state.multiSelect.nodes;
    const origPositions = nodeIds.map(id => {
      const n = dragon.nodes.find(n => n.id === id);
      return { id, x: n.x, y: n.y };
    });
    const startMouseX = e.clientX, startMouseY = e.clientY;
    let hasMoved = false;

    const onMove = ev => {
      const dx = ev.clientX - startMouseX;
      const dy = ev.clientY - startMouseY;
      if (!hasMoved && Math.hypot(dx, dy) < 4) return;
      if (!hasMoved) {
        hasMoved = true;
        dragon.connections.forEach(c => {
          if (nodeIds.includes(c.from) || nodeIds.includes(c.to)) { c.userPts = null; c.midOffset = null; }
        });
      }
      origPositions.forEach(o => {
        const n = dragon.nodes.find(n => n.id === o.id);
        if (!n) return;
        n.x = Math.max(0, o.x + dx);
        n.y = Math.max(0, o.y + dy);
        const el = document.getElementById('node-' + o.id);
        if (el) { el.style.left = n.x + 'px'; el.style.top = n.y + 'px'; }
      });
      renderConnections();
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    return;
  }

  state.selectedNode = nodeId;
  state.selectedConn = null;
  state.multiSelect = { nodes: [], conns: [], regions: [], texts: [] };

  const node = dragon.nodes.find(n => n.id === nodeId);
  state.dragging = { nodeId, startMouseX: e.clientX, startMouseY: e.clientY, startNodeX: node.x, startNodeY: node.y };
  renderCanvas();

  let hasMoved = false;
  const onMove = ev => {
    if (!state.dragging) return;
    const dx = ev.clientX - state.dragging.startMouseX;
    const dy = ev.clientY - state.dragging.startMouseY;
    if (!hasMoved && Math.hypot(dx, dy) < 4) return; // ignore tiny jitter
    if (!hasMoved) {
      // Only reset connections on actual drag start, not on click
      hasMoved = true;
      dragon.connections.forEach(c => {
        if (c.from === nodeId || c.to === nodeId) { c.userPts = null; c.midOffset = null; }
      });
    }
    node.x = Math.max(0, state.dragging.startNodeX + dx);
    node.y = Math.max(0, state.dragging.startNodeY + dy);
    const el = document.getElementById('node-' + nodeId);
    if (el) { el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; }
    renderConnections();
  };
  const onUp = () => {
    state.dragging = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function renderConnections() {
  const dragon = getDragon();
  const svg = document.getElementById('svg-conn');
  const svgTop = document.getElementById('svg-top');
  const defs = document.getElementById('svg-defs');
  while (svg.lastChild && svg.lastChild !== defs) svg.removeChild(svg.lastChild);
  if (svgTop) svgTop.innerHTML = '';
  if (!dragon) return;
  dragon.connections.forEach(conn => {
    const fromNode = dragon.nodes.find(n => n.id === conn.from);
    const toNode = dragon.nodes.find(n => n.id === conn.to);
    if (!fromNode || !toNode) return;
    const fromFrac = conn.fromFrac ?? 0.5;
    const toFrac   = conn.toFrac   ?? 0.5;
    drawConnection(svg, conn, fromNode, toNode, fromFrac, toFrac);
  });
}

function handleConnectClick(nodeId) {
  if (!state.connectFrom) {
    state.connectFrom = nodeId;
    setStatus('連線模式 — 請點選第二個節點');
    renderCanvas();
  } else if (state.connectFrom === nodeId) {
    state.connectFrom = null;
    renderCanvas();
    setStatus('連線模式 — 點第一個節點，再點第二個節點建立連線');
  } else {
    state.pendingConn = { from: state.connectFrom, to: nodeId };
    state.connectFrom = null;
    document.querySelector('input[name="conn-dir"][value="forward"]').checked = true;
    state.selectedConnColor = 'blue';
    state.selectedConnShape = 'diamond';
    document.getElementById('conn-same-pose').checked = true;
    buildConnColorPicker('conn-color-picker', false);
    buildShapePicker('conn-shape-picker', false);
    showModal('modal-conn');
  }
}

function confirmConnect() {

  if (!dragon || !state.pendingConn) return;
  const dir = document.querySelector('input[name="conn-dir"]:checked').value;
  const samePose = document.getElementById('conn-same-pose').checked;
  dragon.connections.push({
    id: cid(),
    from: state.pendingConn.from,
    to: state.pendingConn.to,
    label: '',
    dir,
    color: state.selectedConnColor,
    shape: state.selectedConnShape,
    samePose,
  });
  state.pendingConn = null;
  hideModal('modal-conn');
  renderCanvas();
  setStatus('連線已建立！繼續點選節點建立更多連線');
}

    dragon.connections = [];
    dragon.regions = [];
    renderCanvas();
  });
}

function autoLayout() {
  const dragon = getDragon();
  if (!dragon || dragon.nodes.length === 0) return;
  const groups = {};
  dragon.nodes.forEach(n => {
    if (!groups[n.cat]) groups[n.cat] = [];
    groups[n.cat].push(n);
  });
  const catOrder = ['出現', '待機', '移動', '飛行', '攻擊', '受傷', '死亡', '吼叫', '其他'];
  const cols = 4;
  let row = 0, col = 0;
  const padX = 185, padY = 115, startX = 30, startY = 30;

  catOrder.forEach(cat => {
    if (!groups[cat]) return;
    groups[cat].forEach(node => {
      node.x = startX + col * padX;
      node.y = startY + row * padY;
      col++;
      if (col >= cols) { col = 0; row++; }
    });
  });
  renderCanvas();
}

// ─── 匯出 PNG (包含新箭頭) ───
function exportPNG() {
  const dragon = getDragon();
  if (!dragon || dragon.nodes.length === 0) { setStatus('⚠ 沒有可匯出的節點'); return; }

  let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
  dragon.nodes.forEach(n => {
    const w = n.w || 160, h = n.h || 70;
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + w);
    maxY = Math.max(maxY, n.y + h);
  });

  const pad = 40;
  const W = maxX - minX + pad * 2;
  const H = maxY - minY + pad * 2;

  const canvas = document.createElement('canvas');
  canvas.width = W * 2; canvas.height = H * 2; 
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  ctx.fillStyle = '#14141e';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#2a2a38';
  for (let gx = 0; gx < W; gx += 28) {
    for (let gy = 0; gy < H; gy += 28) {
      ctx.beginPath();
      ctx.arc(gx, gy, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const ox = -minX + pad, oy = -minY + pad;

  function pngEndpointArrow(ax, ay, angle, color) {
    const S=12, W=0.45;
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - S*Math.cos(angle-W), ay - S*Math.sin(angle-W));
    ctx.lineTo(ax - S*Math.cos(angle+W), ay - S*Math.sin(angle+W));
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  
  function pngDiamond(px, py, color) {
    const s = 7;
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.fillStyle = '#14141e';
    ctx.beginPath();
    ctx.moveTo(px, py-s); ctx.lineTo(px+s, py); ctx.lineTo(px, py+s); ctx.lineTo(px-s, py);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  dragon.nodes.forEach(node => {
    const cat = CATS[node.cat] || CATS['其他'];
    const x = node.x + ox, y = node.y + oy;
    const w = node.w || 160, h = node.h || 70;
    const r = 8;

    ctx.fillStyle = cat.bg;
    ctx.strokeStyle = cat.border;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = cat.text;
    ctx.font = '13px Consolas, Courier New, monospace';
    ctx.textAlign = 'left';
    const words = node.name;
    ctx.fillText(words.length > 22 ? words.slice(0, 22) + '…' : words, x + 12, y + 22);

    if (node.notes) {
      ctx.fillStyle = cat.label;
      ctx.font = 'italic 11px Segoe UI, sans-serif';
      ctx.fillText(node.notes.length > 26 ? node.notes.slice(0, 26) + '…' : node.notes, x + 12, y + 38);
    }
  });

  ctx.fillStyle = '#555';
  ctx.font = '11px Segoe UI, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(dragon.name + ' — Dragon Flow', pad, H - 10);

  const link = document.createElement('a');
  link.download = `${dragon.name.replace(/\s/g, '_')}_flow.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function showModal(id) { document.getElementById(id).style.display = 'flex'; }
function hideModal(id) { document.getElementById(id).style.display = 'none'; }

function copyNode() {
  const dragon = getDragon();
  if (!dragon || !state.selectedNode) { setStatus('⚠ 請先點選一個節點再複製'); return; }

  dragon.nodes.push(copy);

function onRegionDrag(e, regionId) {
  e.stopPropagation();
  const dragon = getDragon();
  const region = (dragon.regions || []).find(r => r.id === regionId);
  if (!region) return;
  state.selectedRegion = regionId;
  state.selectedNode = null;
  state.selectedConn = null;

  const contained = dragon.nodes.filter(n => {
    const nw = n.w || 160, nh = n.h || 70;
    return n.x >= region.x && n.y >= region.y &&
           n.x + nw <= region.x + region.w &&
           n.y + nh <= region.y + region.h;
  });

  const containedTexts = (dragon.texts || []).filter(t =>
    t.x >= region.x && t.x <= region.x + region.w &&
    t.y >= region.y && t.y <= region.y + region.h
  );

  const startX = e.clientX, startY = e.clientY;
  const origRegion = { x: region.x, y: region.y };
  const origNodes = contained.map(n => ({ id: n.id, x: n.x, y: n.y }));
  const origTexts = containedTexts.map(t => ({ id: t.id, x: t.x, y: t.y }));

  renderRegions();

  const onMove = ev => {
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    region.x = origRegion.x + dx;
    region.y = origRegion.y + dy;
    origNodes.forEach(o => {
      const node = dragon.nodes.find(n => n.id === o.id);
      if (node) { node.x = o.x + dx; node.y = o.y + dy; }
    });
    origNodes.forEach(o => {
      const el = document.getElementById('node-' + o.id);
      if (el) {
        const node = dragon.nodes.find(n => n.id === o.id);
        el.style.left = node.x + 'px';
        el.style.top  = node.y + 'px';
      }
    });
    origTexts.forEach(o => {
      const txt = (dragon.texts || []).find(t => t.id === o.id);
      if (txt) { txt.x = o.x + dx; txt.y = o.y + dy; }
    });
    renderRegions();
    renderTexts();
    renderConnections();
  };
  const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ─── Text Items ───────────────────────────────────────────────────────────────
function renderTexts() {
  const dragon = getDragon();
  const layer = document.getElementById('text-layer');
  if (!layer || !dragon) return;
  layer.innerHTML = '';
  if (!dragon.texts) return;
  dragon.texts.forEach(txt => {
    const div = document.createElement('div');
    const isSel = state.selectedText === txt.id;
    div.style.cssText = `position:absolute;left:${txt.x}px;top:${txt.y}px;
      color:#e2e0d8;font-family:'Segoe UI','PingFang TC',sans-serif;
      font-size:${txt.size || 16}px;font-weight:${txt.bold ? '600' : '400'};
      white-space:pre-wrap;cursor:move;user-select:none;pointer-events:auto;
      outline:${isSel ? '1.5px dashed #7eb8f0' : 'none'};
      padding:2px 4px;border-radius:3px;`;
    div.textContent = txt.content;
    div.addEventListener('mousedown', e => { e.stopPropagation(); onTextMousedown(e, txt.id); });
    div.addEventListener('dblclick', e => { e.stopPropagation(); openTextEdit(txt.id); });
    // Resize handle (bottom-right corner)
    if (isSel) {
      const rh = document.createElement('div');
      rh.style.cssText = `position:absolute;right:-10px;bottom:-10px;width:14px;height:14px;
        background:#7eb8f0;border-radius:50%;cursor:se-resize;pointer-events:auto;`;
      rh.addEventListener('mousedown', e => { e.stopPropagation(); onTextResize(e, txt.id); });
      div.appendChild(rh);
    }
    layer.appendChild(div);
  });
}

function onTextMousedown(e, txtId) {
  if (state.preview) return;
  state.selectedText = txtId;
  state.selectedNode = null; state.selectedConn = null; state.selectedRegion = null;
  state.multiSelect = { nodes: [], conns: [], regions: [], texts: [] };
  renderTexts();
  setStatus('已選取文字 — 雙擊編輯，Del 刪除，拖曳右下角縮放字體');

  const dragon = getDragon();
  const txt = dragon.texts.find(t => t.id === txtId);
  if (!txt) return;
  const startX = e.clientX, startY = e.clientY;
  const origX = txt.x, origY = txt.y;
  const onMove = ev => {
    txt.x = origX + ev.clientX - startX;
    txt.y = origY + ev.clientY - startY;
    const layer = document.getElementById('text-layer');
    const el = layer && layer.children[Array.from(layer.children).findIndex(c => parseInt(c.style.left) === origX && parseInt(c.style.top) === origY)];
    renderTexts();
  };
  const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function onTextResize(e, txtId) {
  const dragon = getDragon();
  const txt = dragon.texts.find(t => t.id === txtId);
  if (!txt) return;
  const startY = e.clientY;
  const origSize = txt.size || 16;
  const onMove = ev => {
    const dy = ev.clientY - startY;
    txt.size = Math.max(8, Math.min(120, origSize + dy * 0.5));
    renderTexts();
  };
  const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

document.getElementById('canvas-wrap').addEventListener('mousedown', e => {
  if (state.preview) return;
  const validTargets = ['canvas-wrap', 'canvas', 'grid-bg'];

  // Text placement mode
  if (state.mode === 'text' && validTargets.includes(e.target.id)) {
    const wrap = document.getElementById('canvas-wrap');
    const rect = wrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const dragon = getDragon();
    if (!dragon) return;
    if (!dragon.texts) dragon.texts = [];
    const newTxt = { id: uid(), content: '文字', x, y, size: 16 };
    dragon.texts.push(newTxt);
    state.selectedText = newTxt.id;
    state.editingText = newTxt.id;
    renderTexts();
    // Open edit immediately
    document.getElementById('text-edit-content').value = '文字';
    showModal('modal-text-edit');
    setTimeout(() => { const el = document.getElementById('text-edit-content'); el.focus(); el.select(); }, 50);
    return;
  }

  if (state.mode === 'select' && validTargets.includes(e.target.id)) {
    const wrap = document.getElementById('canvas-wrap');
    const rect = wrap.getBoundingClientRect();
    const startX = e.clientX - rect.left;
    const startY = e.clientY - rect.top;
    const selRect = document.getElementById('select-rect');
    let dragged = false;

    const onMove = ev => {
      const cx = ev.clientX - rect.left, cy = ev.clientY - rect.top;
      const x = Math.min(startX, cx), y = Math.min(startY, cy);
      const w = Math.abs(cx - startX), h = Math.abs(cy - startY);
      if (w > 4 || h > 4) {
        dragged = true;
        // Smoother select box styling
        selRect.style.cssText = `display:block;position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;
          border:1.5px dashed rgba(240,192,96,0.6);border-radius:6px;background:rgba(240,192,96,0.08);pointer-events:none;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);`;
      }
    };

    const onUp = ev => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      selRect.style.display = 'none';
      if (!dragged) return;

      const cx = ev.clientX - rect.left, cy = ev.clientY - rect.top;
      const sx = Math.min(startX, cx), sy = Math.min(startY, cy);
      const sw = Math.abs(cx - startX), sh = Math.abs(cy - startY);
      if (sw < 4 || sh < 4) return;

      const dragon = getDragon();
      if (!dragon) return;

      const selNodes = dragon.nodes.filter(n => {
        const nw = n.w || 160, nh = n.h || 70;
        return n.x < sx+sw && n.x+nw > sx && n.y < sy+sh && n.y+nh > sy;
      }).map(n => n.id);

      const selConns = dragon.connections.filter(c => selNodes.includes(c.from) && selNodes.includes(c.to)).map(c => c.id);
      const selRegions = (dragon.regions || []).filter(r => r.x < sx+sw && r.x+r.w > sx && r.y < sy+sh && r.y+r.h > sy).map(r => r.id);
      const selTexts = (dragon.texts || []).filter(t => t.x > sx && t.x < sx+sw && t.y > sy && t.y < sy+sh).map(t => t.id);

      const total = selNodes.length + selConns.length + selRegions.length + selTexts.length;
      if (total === 0) {
        state.multiSelect = { nodes: [], conns: [], regions: [], texts: [] };
        renderCanvas();
        return;
      }

      state.multiSelect = { nodes: selNodes, conns: selConns, regions: selRegions, texts: selTexts };
      state.selectedNode = null;
      state.selectedConn = null;
      state.selectedRegion = null;
      state.selectedText = null;
      state._dragSelectJustEnded = true;
      renderCanvas();
      setStatus(`已框選 ${selNodes.length} 個節點、${selConns.length} 條連線、${selRegions.length} 個情境、${selTexts.length} 個文字 — 按 Del 全部刪除`);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    return;
  }

  if (state.mode !== 'region') return;
  const regionTargets = ['canvas-wrap', 'canvas', 'grid-bg', 'regions-layer', 'region-draft'];
  if (!regionTargets.includes(e.target.id)) return;

  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const startX = e.clientX - rect.left;
  const startY = e.clientY - rect.top;
  const draft = document.getElementById('region-draft');

  const onMove = ev => {
    const cx = ev.clientX - rect.left;
    const cy = ev.clientY - rect.top;
    const x = Math.min(startX, cx), y = Math.min(startY, cy);
    const w = Math.abs(cx - startX), h = Math.abs(cy - startY);
    draft.style.cssText = `display:block;position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;
      border:2px dashed rgba(126,184,240,0.6);border-radius:12px;background:rgba(126,184,240,0.1);pointer-events:none;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);`;
    state.regionDraft = { x, y, w, h };
  };

  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    draft.style.display = 'none';
    if (state.regionDraft && state.regionDraft.w > 30 && state.regionDraft.h > 30) {
      state.pendingRegion = { ...state.regionDraft };
      state.selectedRegionColor = 'blue';
      document.getElementById('region-label').value = '';
      buildColorPicker('region-color-picker', false);
      showModal('modal-region');
      setTimeout(() => document.getElementById('region-label').focus(), 50);
    }
    state.regionDraft = null;
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

function deleteRegion() {
  customConfirm('確定刪除此情境區域？（節點不會被刪除）', '刪除', () => {
    const dragon = getDragon();
    if (!dragon) return;
    dragon.regions = (dragon.regions || []).filter(r => r.id !== state.editingRegion);
    state.editingRegion = null;
    state.selectedRegion = null;
    hideModal('modal-region-edit');
    renderCanvas();
  });
}

document.getElementById('canvas-wrap').addEventListener('click', e => {
  const bg = ['canvas-wrap', 'canvas', 'grid-bg'];
  if (!bg.includes(e.target.id)) return;
  if (state._dragSelectJustEnded) { state._dragSelectJustEnded = false; return; }
  state.selectedNode = null;
  state.selectedConn = null;
  state.selectedRegion = null;
  state.multiSelect = { nodes: [], conns: [], regions: [], texts: [] };
  renderConnections();
  renderRegions();
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'p' || e.key === 'P') { togglePreview(); return; }
  if (state.preview) return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); copyNode(); }
  if (e.key === 'Escape' || e.key === 'q' || e.key === 'Q') setMode('select');
  if (e.key === 'w' || e.key === 'W') setMode('connect');
  if (e.key === 'g' || e.key === 'G') setMode('region');
  if (e.key === 't' || e.key === 'T') setMode('text');
  if (e.key === 'Delete' || e.key === 'Backspace') {
    const dragon = getDragon();
    if (!dragon) return;
    const ms = state.multiSelect;
    if (ms.nodes.length || ms.conns.length || ms.regions.length || (ms.texts && ms.texts.length)) {
      dragon.nodes       = dragon.nodes.filter(n => !ms.nodes.includes(n.id));
      dragon.connections = dragon.connections.filter(c => !ms.conns.includes(c.id) && !ms.nodes.includes(c.from) && !ms.nodes.includes(c.to));
      dragon.regions     = (dragon.regions||[]).filter(r => !ms.regions.includes(r.id));
      dragon.texts       = (dragon.texts||[]).filter(t => !(ms.texts||[]).includes(t.id));
      state.multiSelect  = { nodes: [], conns: [], regions: [], texts: [] };
      renderCanvas();
      return;
    }
    if (state.selectedNode) {
      dragon.nodes = dragon.nodes.filter(n => n.id !== state.selectedNode);
      dragon.connections = dragon.connections.filter(c => c.from !== state.selectedNode && c.to !== state.selectedNode);
      state.selectedNode = null;
      renderCanvas();
    } else if (state.selectedConn) {
      dragon.connections = dragon.connections.filter(c => c.id !== state.selectedConn);
      state.selectedConn = null;
      renderCanvas();
    } else if (state.selectedRegion) {
      dragon.regions = (dragon.regions || []).filter(r => r.id !== state.selectedRegion);
      state.selectedRegion = null;
      renderCanvas();
    } else if (state.selectedText) {
      dragon.texts = (dragon.texts || []).filter(t => t.id !== state.selectedText);
      state.selectedText = null;
      renderTexts();
    }
  }
});

function exportJSON() {
  const data = { dragons: state.dragons, activeDragon: state.activeDragon, nextId: state.nextId };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.download = 'data.json';
  link.href = URL.createObjectURL(blob);
  link.click();
  setStatus('✓ data.json 已下載，請上傳到 GitHub repo 根目錄覆蓋舊檔');
}

async function loadFromDataJson() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) return false;
    const data = await res.json();
    if (!data.dragons || !data.dragons.length) return false;
    data.dragons.forEach(d => { if (!d.regions) d.regions = []; if (!d.texts) d.texts = []; });
    state.dragons = data.dragons;
    state.activeDragon = data.activeDragon;
    state.nextId = data.nextId || 1;
    return true;
  } catch(e) { return false; }
}

function shareLink() {
  try {
    const data = { dragons: state.dragons, activeDragon: state.activeDragon, nextId: state.nextId };
    const json = JSON.stringify(data);
    const compressed = btoa(encodeURIComponent(json)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    const url = location.href.split('#')[0] + '#data=' + compressed;
    navigator.clipboard.writeText(url).then(() => { setStatus('✓ 分享連結已複製到剪貼簿！貼給對方就能看到你的流程圖'); }).catch(() => { prompt('請手動複製這個連結：', url); });
  } catch(e) { setStatus('⚠ 資料太大，無法產生連結，請改用匯出 PNG'); }
}

function loadFromHash() {
  try {
    const hash = location.hash;
    if (!hash.startsWith('#data=')) return false;
    const raw = hash.slice(6);
    const b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
    const padded = b64 + '=='.slice(0, (4 - b64.length % 4) % 4);
    const json = decodeURIComponent(atob(padded));
    const data = JSON.parse(json);
    if (!data.dragons || !data.dragons.length) return false;
    data.dragons.forEach(d => { if (!d.regions) d.regions = []; if (!d.texts) d.texts = []; });
    state.dragons = data.dragons;
    state.activeDragon = data.activeDragon;
    state.nextId = data.nextId || 1;
    return true;
  } catch(e) { return false; }
}

const SAVE_KEY = 'dragonflow_v1';
function saveToStorage() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ dragons: state.dragons, activeDragon: state.activeDragon, nextId: state.nextId })); } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.dragons || !data.dragons.length) return false;
    data.dragons.forEach(d => { if (!d.regions) d.regions = []; if (!d.texts) d.texts = []; });
    state.dragons = data.dragons;
    state.activeDragon = data.activeDragon;
    state.nextId = data.nextId || 1;
    return true;
  } catch(e) { return false; }
}

let _saveTimer = null;
function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveToStorage, 800); }
const _origRenderCanvas = renderCanvas;
renderCanvas = function() { _origRenderCanvas(); scheduleSave(); };

(async () => {
  const fromJson    = await loadFromDataJson();
  const fromHash    = !fromJson && loadFromHash();
  const fromStorage = !fromJson && !fromHash && loadFromStorage();
  if (!fromJson && !fromHash && !fromStorage) {
    state.dragons.push({ id: uid(), name: 'Small Dragon', nodes: [], connections: [], regions: [], texts: [] });
    state.activeDragon = state.dragons[0].id;
  }
  renderSidebar();
  renderCanvas();
  if (fromJson)    setStatus('✓ 已從 data.json 載入最新流程圖');
  else if (fromHash)    setStatus('✓ 已從分享連結載入流程圖');
  else if (fromStorage) setStatus('已自動載入上次的工作內容');
  else setStatus('選取模式 — 點「貼上動作」開始新增節點');
})();
</script>
</body>
